name: Test Environment

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v5

      - name: 2. Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: 'maven'
    
      - name: 3. Install Gradle
        uses: gradle/actions/setup-gradle@v4
        
      - name: 4. Generate Gradle Wrapper
        run: gradle wrapper
 

      - name: 5. Grant execute permission
        run: chmod +x gradlew

      
      - name: 6. Run Tests
        run: ./gradlew test --tests "com.gradleproject.data.OrderTestIT"
